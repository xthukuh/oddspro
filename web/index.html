<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="author" content="Martin Thuku - https://github.com/xthukuh" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title (with the package.json version) and the optional Google Analytics
         snippet are injected at build time from VITE_* env vars - see
         vite.config.js. This static title is only a dev/fallback. -->
    <title>Odds Pro</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <!-- Theme FOUC guard: apply the saved theme BEFORE first paint. Default is
         LIGHT when unset (System is opt-in); only 'system' leaves data-theme off
         so prefers-color-scheme wins. Mirrors web/src/theme.js - keep the storage
         key + values in sync. -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('oddspro.theme');
                if (t === 'system') return;                 // follow the OS
                document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
            } catch (e) { /* private mode / no storage - CSS prefers-color-scheme applies */ }
        })();
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
