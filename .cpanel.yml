---
# Drives cPanel Git Version Control's "Deploy HEAD Commit" button. Each task
# line runs as its own shell invocation (cPanel does not persist cd/source
# across lines), which is why npm commands re-activate the venv each time.
# One-time setup: fill in <CPANEL_USER>/<APP_DIR>/<NODE_VERSION> below using
# the exact values shown on cPanel's "Setup Node.js App" page for this app
# (Repository Path == Application Root - see docs/DEPLOYMENT.md).
deployment:
  tasks:
    - /bin/mkdir -p logs tmp cache backups
    - source /home/<CPANEL_USER>/nodevenv/<APP_DIR>/<NODE_VERSION>/bin/activate && npm install --omit=dev --no-audit --no-fund
    - source /home/<CPANEL_USER>/nodevenv/<APP_DIR>/<NODE_VERSION>/bin/activate && npm run migrate
    - /bin/touch tmp/restart.txt
